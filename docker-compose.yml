services:
  db:
    image: mysql:8.0
    container_name: realestate-db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: realty_db
      MYSQL_ROOT_PASSWORD: qnehdtks1!
      MYSQL_USER: realestate
      MYSQL_PASSWORD: qnehdtks1!
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 300M  # 1GB 서버를 위해 DB 메모리 점유율을 낮춤

  app:
    build: .
    container_name: realestate-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # 중요: DB 주소를 localhost가 아닌 서비스 이름인 'db'로 적어야 도커끼리 통신이 됩니다.
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/realty_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: realestate
      SPRING_DATASOURCE_PASSWORD: qnehdtks1!
    deploy:
      resources:
        limits:
          memory: 500M  # 스프링 부트가 사용할 메모리 제한