name: Java CI with Gradle and Deploy to Azure

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew bootJar

      - name: Docker build & push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ktjone/realestate-app .
          docker push ktjone/realestate-app


      - name: Deploy to Azure
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          password: ${{ secrets.AZURE_PASSWORD }}
          script: |
            cd ~/realestate
            # 1. 기존 컨테이너 중지 및 삭제 (안전한 재시작을 위해)
            docker-compose down
            # 2. 최신 이미지 가져오기
            docker-compose pull
            # 3. 백그라운드 실행
            docker-compose up -d